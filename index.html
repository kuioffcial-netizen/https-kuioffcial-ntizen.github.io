<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI Portal</title>
    <style>
        :root {
            --bg-color: #0a0a0e;
            --panel-bg: rgba(20, 20, 28, 0.75);
            --accent-glow: #00f2fe;
            --accent-purple: #4facfe;
            --text-main: #f1f5f9;
            --border-color: rgba(0, 242, 254, 0.2);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, #1a1b26 0%, var(--bg-color) 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent-glow);
            filter: blur(150px);
            opacity: 0.15;
            top: 20%;
            left: 25%;
            animation: floatGlow 8s infinite alternate ease-in-out;
            z-index: 0;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 30px) scale(1.2); }
        }

        .portal-card {
            width: 100%;
            max-width: 480px;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 0 0 40px rgba(0, 242, 254, 0.05);
            padding: 35px;
            box-sizing: border-box;
            z-index: 10;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #loginScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transform: scale(1);
            opacity: 1;
        }

        .avatar-glow {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-glow));
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            margin-bottom: 20px;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.4);
            animation: pulseGlow 2s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); }
            50% { box-shadow: 0 0 30px rgba(0, 242, 254, 0.6); }
            100% { box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); }
        }

        .portal-card h2 {
            margin: 0 0 10px 0;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(to right, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .input-group {
            width: 100%;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .custom-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 16px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        .custom-input:focus {
            border-color: var(--accent-glow);
            background: rgba(0, 242, 254, 0.03);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
        }

        .action-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-glow));
            color: #0f172a;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.2);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4);
        }

        #assistantScreen {
            max-width: 650px;
            height: 80vh;
            display: none;
            flex-direction: column;
            padding: 0;
            overflow: hidden;
            opacity: 0;
            transform: translateY(30px);
        }

        .dash-header {
            padding: 20px 25px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
        }

        .chat-container {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .msg {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 0.95rem;
            animation: msgPop 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }

        @keyframes msgPop {
            from { opacity: 0; transform: translateY(10px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .msg.user {
            background: linear-gradient(135deg, var(--accent-purple), #2563eb);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .msg.bot {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg-input-area {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
        }

        .msg-input-area .custom-input {
            border-radius: 14px;
        }

        .send-icon-btn {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-glow));
            border: none;
            width: 50px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .send-icon-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }
    </style>
</head>
<body>

    <div class="portal-card" id="loginScreen">
        <div class="avatar-glow">👑</div>
        <h2>Welcome to Nexus AI</h2>
        <div class="subtitle">Enter your details to initialize connection</div>
        
        <div class="input-group">
            <label>Master Username</label>
            <input type="text" id="usernameInput" class="custom-input" placeholder="Type your name..." autocomplete="off">
        </div>
        
        <button class="action-btn" onclick="handleLogin()">AUTHENTICATE</button>
    </div>

    <div class="portal-card" id="assistantScreen">
        <div class="dash-header">
            <div class="user-profile">
                <div class="user-status-dot"></div>
                <span style="font-weight: 600;" id="displayUser">Admin</span>
            </div>
            <span style="font-size: 0.8rem; color: #64748b; letter-spacing: 0.5px;">SYSTEM ACTIVE</span>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="msg bot">Initialization complete. Connected to internet AI logic. Ask me anything!</div>
        </div>
        
        <div class="msg-input-area">
            <input type="text" id="dashboardInput" class="custom-input" placeholder="Ask a question or talk to AI..." onkeypress="handleDashKey(event)">
            <button class="send-icon-btn" onclick="processDashboardMessage()">⚡</button>
        </div>
    </div>

<script>
    let currentUserName = "User";
    let todos = [];
    const quotes = [
        "The best way to predict the future is to create it.",
        "Simplicity is the soul of efficiency.",
        "Your focus determines your reality."
    ];

    function getClosestCommand(inputWord, validCommands) {
        if (!inputWord) return '';
        let bestMatch = null;
        let minDistance = 3; 

        for (const cmd of validCommands) {
            if (inputWord === cmd) return cmd;
            
            const track = Array(cmd.length + 1).fill(null).map(() => Array(inputWord.length + 1).fill(null));
            for (let i = 0; i <= cmd.length; i += 1) track[i][0] = i;
            for (let j = 0; j <= inputWord.length; j += 1) track[0][j] = j;
            
            for (let i = 1; i <= cmd.length; i += 1) {
                for (let j = 1; j <= inputWord.length; j += 1) {
                    const indicator = cmd[i - 1] === inputWord[j - 1] ? 0 : 1;
                    track[i][j] = Math.min(
                        track[i - 1][j] + 1,
                        track[i][j - 1] + 1,
                        track[i - 1][j - 1] + indicator
                    );
                }
            }
            const distance = track[cmd.length][inputWord.length];
            if (distance < minDistance) {
                minDistance = distance;
                bestMatch = cmd;
            }
        }
        return bestMatch || inputWord;
    }

    function handleLogin() {
        const nameInput = document.getElementById('usernameInput').value.trim();
        if(nameInput !== "") {
            currentUserName = nameInput;
        }
        document.getElementById('displayUser').innerText = currentUserName;

        const loginCard = document.getElementById('loginScreen');
        const dashCard = document.getElementById('assistantScreen');

        loginCard.style.opacity = "0";
        loginCard.style.transform = "scale(0.9)";
        
        setTimeout(() => {
            loginCard.style.display = "none";
            dashCard.style.display = "flex";
            setTimeout(() => {
                dashCard.style.opacity = "1";
                dashCard.style.transform = "translateY(0)";
            }, 50);
        }, 500);
    }

    function handleDashKey(e) {
        if(e.key === 'Enter') processDashboardMessage();
    }

    function processDashboardMessage() {
        const inputEl = document.getElementById('dashboardInput');
        const val = inputEl.value.trim();
        if(!val) return;

        addMsg(val, 'user');
        inputEl.value = '';

        setTimeout(async () => {
            const box = document.getElementById('chatContainer');
            const loadDiv = document.createElement('div');
            loadDiv.className = 'msg bot temp-loading';
            loadDiv.innerHTML = '🧠 Thinking...';
            box.appendChild(loadDiv);
            box.scrollTop = box.scrollHeight;

            const reply = await handleBotLogic(val.toLowerCase(), val);
            
            loadDiv.remove();
            addMsg(reply, 'bot');
        }, 300);
    }

    function addMsg(text, sender) {
        const box = document.getElementById('chatContainer');
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.innerHTML = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    async function handleBotLogic(cleanCmd, originalText) {
        const tokens = cleanCmd.split(' ');
        const firstWord = tokens[0];
        
        const baseCommands = ['help', 'time', 'quote', 'calc', 'todo', 'weather'];
        const correctedKeyword = getClosestCommand(firstWord, baseCommands);

        if (tokens.length === 1 && correctedKeyword === 'help') {
            return `Hello <b>${currentUserName}</b>, here are your utility shortcuts:<br>
                    • <b>time</b> - System clock<br>
                    • <b>quote</b> - Insight generator<br>
                    • <b>calc [math]</b> - e.g., <i>calc 50 * 2</i><br>
                    • <b>todo add/list/clear</b> - Checklist<br>
                    • <b>weather [city]</b> - Live climate radar<br><br>
                    Otherwise, just type normally to speak with the general AI!`;
        }
        if (tokens.length === 1 && correctedKeyword === 'time') {
            return `Current session time: <b>${new Date().toLocaleString()}</b>`;
        }
        if (tokens.length === 1 && correctedKeyword === 'quote') {
            return `<i>"${quotes[Math.floor(Math.random() * quotes.length)]}"</i>`;
        }
        if (correctedKeyword === 'calc' && tokens.length > 1) {
            const expr = originalText.substring(tokens[0].length).trim();
            try { return `Result: <b>${new Function(`return ${expr}`)()}</b>`; } catch(e) { return "❌ Math syntax error."; }
        }
        if (correctedKeyword === 'weather' && tokens.length > 1) {
            const city = originalText.substring(tokens[0].length).trim();
            try {
                const response = await fetch(`https://wttr.in/${encodeURIComponent(city)}?format=j1`);
                const data = await response.json();
                return `🌍 Web data for <b>${city}</b>: <b>${data.current_condition[0].temp_C}°C</b>, ${data.current_condition[0].weatherDesc[0].value}.`;
            } catch(e) { return `🌤️ Weather network timeout for ${city}.`; }
        }
        if (correctedKeyword === 'todo' && tokens.length > 1) {
            const actionPart = cleanCmd.substring(firstWord.length).trim();
            const subTokens = actionPart.split(' ');
            const correctedSub = getClosestCommand(subTokens[0], ['add', 'list', 'clear']);

            if (correctedSub === 'add') {
                todos.push(originalText.substring(firstWord.length + subTokens[0].length + 1).trim());
                return `✅ Task recorded.`;
            }
            if (correctedSub === 'list') {
                return todos.length === 0 ? "Checklist empty." : `<b>Tasks:</b><br>` + todos.map((t, i) => `${i+1}. ${t}`).join('<br>');
            }
            if (correctedSub === 'clear') { todos = []; return "🗑️ Checklist wiped."; }
        }

        // --- GENERAL CHAT OVERLAY ENGINE WITH OPENAI METHOD PATH ---
        try {
            const aiResponse = await fetch(`https://text.pollinations.ai/openai?prompt=${encodeURIComponent(originalText)}`);
            if(!aiResponse.ok) throw new Error();
            let aiText = await aiResponse.text();
            return aiText.replace(/\n/g, "<br>");
        } catch(err) {
            return "🤔 Connection hiccup. Try typing your message again!";
        }
    }
</script>
</body>
</html>
