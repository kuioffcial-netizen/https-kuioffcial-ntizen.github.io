<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus AI Portal</title>
    <style>
        :root { --bg: #0a0a0e; --text: #f1f5f9; --accent: #00f2fe; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .chat-box { max-width: 600px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 10px; height: 400px; overflow-y: auto; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 8px; }
        .user { background: #4facfe; text-align: right; }
        .bot { background: #222; }
        .input-area { max-width: 600px; margin: 10px auto; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; }
    </style>
</head>
<body>
    <div class="chat-box" id="chat">
        <div class="msg bot">Nexus AI Ready. Please enter your API key to begin.</div>
    </div>
    <div class="input-area">
        <input id="apiKey" type="password" placeholder="Enter Google Gemini API Key">
        <input id="in" placeholder="Ask anything...">
        <button onclick="send()">Send</button>
    </div>

    <script>
        async function send() {
            const input = document.getElementById('in');
            const key = document.getElementById('apiKey').value;
            const chat = document.getElementById('chat');
            const val = input.value;
            
            if (!key) { alert("Please enter your API key first."); return; }
            
            chat.innerHTML += `<div class="msg user">${val}</div>`;
            input.value = '';

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: val }] }] })
                });
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                chat.innerHTML += `<div class="msg bot">${reply}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="msg bot">Error: Check your API key or connection.</div>`;
            }
        }
    </script>
</body>
</html>
