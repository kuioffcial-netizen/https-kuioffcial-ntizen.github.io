<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus AI Portal</title>
    <style>
        :root { --bg: #0a0a0e; --text: #f1f5f9; --accent: #00f2fe; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .chat-box { max-width: 600px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 10px; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 8px; }
        .user { background: #4facfe; text-align: right; }
        .bot { background: #222; }
    </style>
</head>
<body>
    <div class="chat-box" id="chat">
        <div class="msg bot">Nexus AI Ready.</div>
    </div>
    <input id="in" placeholder="Ask anything...">
    <button onclick="send()">Send</button>

    <script>
        async function send() {
            const input = document.getElementById('in');
            const chat = document.getElementById('chat');
            const val = input.value;
            
            chat.innerHTML += `<div class="msg user">${val}</div>`;
            input.value = '';

            try {
                // This uses a public stable gateway
                const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(val)}`);
                const reply = await res.text();
                chat.innerHTML += `<div class="msg bot">${reply}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="msg bot">Error: Server busy. Try again.</div>`;
            }
        }
    </script>
</body>
</html>
