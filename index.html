<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Assistant</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: #1a1a1e;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            height: 80vh;
            overflow: hidden;
            border: 1px solid #2d2d34;
        }
        .header {
            background: #252529;
            padding: 15px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid #2d2d34;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 8px;
            line-height: 1.4;
        }
        .user-msg {
            background: #3b82f6;
            color: white;
            align-self: flex-end;
        }
        .bot-msg {
            background: #2d2d34;
            color: #e2e8f0;
            align-self: flex-start;
        }
        .input-area {
            display: flex;
            padding: 15px;
            background: #1a1a1e;
            border-top: 1px solid #2d2d34;
        }
        input {
            flex: 1;
            background: #252529;
            border: 1px solid #3a3a42;
            padding: 12px;
            color: white;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
        }
        input:focus {
            border-color: #3b82f6;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0 20px;
            margin-left: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span>🤖 Personal Assistant Bot</span>
    </div>
    <div class="chat-box" id="chatBox">
        <div class="message bot-msg">Hello! I'm your local browser assistant. Type <b>help</b> to see what I can do!</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type a command here..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const quotes = [
        "The best way to predict the future is to create it.",
        "Simplicity is the soul of efficiency.",
        "Make it work, make it right, make it fast.",
        "Your focus determines your reality."
    ];
    let todos = [];

    // Smart helper that catches spelling mistakes (Levenshtein Distance logic)
    function getClosestCommand(inputWord, validCommands) {
        let bestMatch = null;
        let minDistance = 3; // Allows up to 2 typos

        for (const cmd of validCommands) {
            if (inputWord === cmd) return cmd; // Perfect match
            
            // Calculate differences between words
            const track = Array(cmd.length + 1).fill(null).map(() => Array(inputWord.length + 1).fill(null));
            for (let i = 0; i <= cmd.length; i += 1) track[i][0] = i;
            for (let j = 0; j <= inputWord.length; j += 1) track[0][j] = j;
            
            for (let i = 1; i <= cmd.length; i += 1) {
                for (let j = 1; j <= inputWord.length; j += 1) {
                    const indicator = cmd[i - 1] === inputWord[j - 1] ? 0 : 1;
                    track[i][j] = Math.min(
                        track[i - 1][j] + 1,
                        track[i][j - 1] + 1,
                        track[i - 1][j - 1] + indicator
                    );
                }
            }
            
            const distance = track[cmd.length][inputWord.length];
            if (distance < minDistance) {
                minDistance = distance;
                bestMatch = cmd;
            }
        }
        return bestMatch || inputWord;
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    function sendMessage() {
        const inputEl = document.getElementById('userInput');
        const query = inputEl.value.trim();
        if (!query) return;

        addMessage(query, 'user-msg');
        inputEl.value = '';

        setTimeout(() => {
            const response = processCommand(query.toLowerCase());
            addMessage(response, 'bot-msg');
        }, 300);
    }

    function addMessage(text, className) {
        const chatBox = document.getElementById('chatBox');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        msgDiv.innerHTML = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function processCommand(rawCmd) {
        // Break the input down to look at the first word (the action keyword)
        const tokens = rawCmd.split(' ');
        const firstWord = tokens[0];
        
        // List of main actions the bot knows
        const baseCommands = ['help', 'time', 'quote', 'calc', 'todo'];
        
        // Find the closest real word if there's a typo!
        const correctedKeyword = getClosestCommand(firstWord, baseCommands);
        
        // Rebuild the command with the corrected first word
        tokens[0] = correctedKeyword;
        const cmd = tokens.join(' ');

        // HELP COMMAND
        if (cmd === 'help') {
            return `Here are the things you can ask me to do:<br>
                    • <b>time</b> - Show current time and date<br>
                    • <b>quote</b> - Get a quick motivational quote<br>
                    • <b>calc [math]</b> - e.g., <i>calc 12 * 5</i> or <i>calc 100 / 4</i><br>
                    • <b>todo add [task]</b> - Add an item to your checklist<br>
                    • <b>todo list</b> - View your current checklist<br>
                    • <b>todo clear</b> - Erase your checklist`;
        }
        
        // TIME COMMAND
        if (cmd === 'time') {
            return `Current local time is: <b>${new Date().toLocaleString()}</b>`;
        }

        // QUOTE COMMAND
        if (cmd === 'quote') {
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            return `<i>"${randomQuote}"</i>`;
        }

        // CALCULATOR COMMAND
        if (cmd.startsWith('calc ')) {
            const mathExpression = cmd.substring(5);
            try {
                const result = new Function(`return ${mathExpression}`)();
                return `Result: <b>${result}</b>`;
            } catch (e) {
                return "❌ Oops, that math expression looks invalid. Try something like <code>calc 5 * 50</code>.";
            }
        }

        // TODO COMMANDS
        if (cmd.startsWith('todo ')) {
            const actionPart = cmd.substring(5);
            
            // Check sub-actions for todo (add, list, clear) with typo protection
            const subTokens = actionPart.split(' ');
            const subAction = subTokens[0];
            const correctedSub = getClosestCommand(subAction, ['add', 'list', 'clear']);
            
            if (correctedSub === 'add') {
                const task = actionPart.substring(subAction.length).trim();
                if(task === "") return "Please specify a task to add.";
                todos.push(task);
                return `✅ Added <b>"${task}"</b> to your list. Total items: ${todos.length}`;
            }
            
            if (correctedSub === 'list') {
                if (todos.length === 0) return "📝 Your to-do list is empty!";
                let listHtml = "<b>Your To-Do List:</b><br>";
                todos.forEach((item, index) => {
                    listHtml += `${index + 1}. ${item}<br>`;
                });
                return listHtml;
            }

            if (correctedSub === 'clear') {
                todos = [];
                return "🗑️ Your checklist has been completely cleared!";
            }
        }

        return "🤔 I didn't quite catch that command. Type <b>help</b> to see a list of things I understand!";
    }
</script>

</body>
</html>
