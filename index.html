<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Royal Software Hub</title>
    <style>
        :root { --bg: #050505; --panel: #111; --accent: #d4af37; --text: #e2e8f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        h1 { color: var(--accent); font-size: 2.5em; margin-bottom: 20px; }
        .download-container { display: flex; flex-direction: column; gap: 15px; width: 250px; }
        .btn { padding: 15px; border-radius: 8px; border: none; background: var(--panel); color: white; cursor: pointer; font-weight: bold; border: 1px solid #333; transition: 0.3s; }
        .btn:hover { background: var(--accent); color: black; }
        .footer { margin-top: 40px; font-size: 0.8em; color: #666; }
    </style>
</head>
<body>

    <h1>Royal Software Hub</h1>
    <p>Select your system to download the app:</p>

    <div class="download-container">
        <!-- Replace the '#' with the actual links to your files -->
        <button class="btn" onclick="window.location.href='YOUR_WINDOWS_LINK'">Download for Windows (.exe)</button>
        <button class="btn" onclick="window.location.href='YOUR_LINUX_LINK'">Download for Linux (.deb)</button>
        <button class="btn" onclick="window.location.href='YOUR_MAC_LINK'">Download for macOS (.dmg)</button>
    </div>

    <div class="footer">Royal Software Hub © 2026 - Secure & Private</div>

</body>
</html>
