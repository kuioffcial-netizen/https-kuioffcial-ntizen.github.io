<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus AI Portal</title>
    <style>
        :root { --bg: #0a0a0e; --text: #f1f5f9; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .chat-box { max-width: 600px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 10px; height: 400px; overflow-y: auto; background: #111; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 8px; }
        .user { background: #4facfe; text-align: right; }
        .bot { background: #222; }
        .input-area { max-width: 600px; margin: 10px auto; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; }
    </style>
</head>
<body>
    <div class="chat-box" id="chat">
        <div class="msg bot">Nexus AI Online (No-Key Mode). Ask me anything!</div>
    </div>
    <div class="input-area">
        <input id="in" placeholder="Ask anything...">
        <button onclick="send()">Send</button>
    </div>

    <script>
        async function send() {
            const input = document.getElementById('in');
            const chat = document.getElementById('chat');
            const val = input.value;
            
            chat.innerHTML += `<div class="msg user">${val}</div>`;
            input.value = '';

            try {
                // Using a public-gateway to reach open-source models
                const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(val)}?model=mistral`);
                const reply = await res.text();
                chat.innerHTML += `<div class="msg bot">${reply}</div>`;
            } catch (e) {
                chat.innerHTML += `<div class="msg bot">Connection error. Please try again.</div>`;
            }
        }
    </script>
</body>
</html>
